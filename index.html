<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ENJOY YOUR STUDYING!</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <!-- Заголовки -->
      <h1 class="card__title">ENJOY YOUR STUDYING!</h1>
      <p class="card__subtitle">Our online courses</p>

      <!-- Фильтры + Поиск в одном ряду -->
      <div class="controls">
        <div class="filters" id="filterButtons">
          <button
            class="filters__item filters__item--active"
            data-category="all"
          >
            All <span class="filters__count">9</span>
          </button>
          <button class="filters__item" data-category="marketing">
            Marketing <span class="filters__count">2</span>
          </button>
          <button class="filters__item" data-category="management">
            Management <span class="filters__count">2</span>
          </button>
          <button class="filters__item" data-category="hr">
            HR & Recruiting <span class="filters__count">2</span>
          </button>
          <button class="filters__item" data-category="design">
            Design <span class="filters__count">2</span>
          </button>
          <button class="filters__item" data-category="development">
            Development <span class="filters__count">1</span>
          </button>
        </div>

        <div class="search">
          <div class="search__wrapper">
            <input
              type="text"
              class="search__input"
              id="searchInput"
              placeholder="Search course..."
            />
            <svg
              class="search__icon"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#9ca3af"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </div>
        </div>
      </div>

      <!-- Карточки курсов -->
      <div class="courses">
        <div class="courses__grid" id="coursesGrid">
          <!-- Карточки будут добавлены через JavaScript -->
        </div>

        <!-- Кнопка Load more -->
        <div class="courses__load-more">
          <button class="load-more__button">
            <span class="load-more__icon">
              <!-- СЮДА ВСТАВЛЯЙ КАРТИНКУ -->
              <img
                src="images/Convert.png"
                alt="arrow"
                width="20"
                height="20"
              />
              <!-- ИЛИ ИСПОЛЬЗУЙ SVG СТРЕЛКУ -->
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </span>
            <span class="load-more__text">Load more</span>
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
